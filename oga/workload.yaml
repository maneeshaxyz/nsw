apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: nsw-oga

endpoints:
  - name: api
    port: 8081
    type: REST
    basePath: /
    visibility:
      - external

configurations:
  env:
    - name: OGA_PORT
      value: "8081"
    - name: OGA_DB_PATH
      value: /data/oga_applications.db
    - name: OGA_FORMS_PATH
      value: ./data/forms
    - name: OGA_DEFAULT_FORM_ID
      value: default
    - name: OGA_ALLOWED_ORIGINS
      value: http://localhost:5174,http://localhost:5175,http://localhost:5176
